services:
  postgres:
    image: postgres:15-alpine
    container_name: avukat-postgres
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres_secure_password}
      POSTGRES_DB: ${DB_NAME:-avukat_db}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres} -d ${DB_NAME:-avukat_db}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:alpine
    container_name: avukat-redis
    restart: always
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  case-service:
    build:
      context: ./services/case-service
      dockerfile: Dockerfile
    container_name: avukat-case-service
    restart: always
    ports:
      - "3001:3001"
    environment:
      - DATABASE_URL=postgresql://${DB_USER:-postgres}:${DB_PASSWORD:-postgres_secure_password}@postgres:5432/${DB_NAME:-avukat_db}?schema=public
      - REDIS_URL=redis://redis:6379
      - PORT=3001
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  notification-service:
    build:
      context: ./services/notification-service
      dockerfile: Dockerfile
    container_name: avukat-notification-service
    restart: always
    ports:
      - "3002:3002"
    environment:
      - DATABASE_URL=postgresql://${DB_USER:-postgres}:${DB_PASSWORD:-postgres_secure_password}@postgres:5432/${DB_NAME:-avukat_db}?schema=public
      - REDIS_URL=redis://redis:6379
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - WEBHOOK_URL=${WEBHOOK_URL}
      - N8N_REMINDER_URL=${N8N_REMINDER_URL:-http://n8n:5678/webhook/reminder}
      - PORT=3002
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  n8n:
    image: docker.n8n.io/n8nio/n8n:latest
    container_name: avukat-n8n
    restart: always
    ports:
      - "5678:5678"
    environment:
      - N8N_HOST=${N8N_HOST:-localhost}
      - N8N_PORT=5678
      - N8N_PROTOCOL=http
      - WEBHOOK_URL=${WEBHOOK_URL:-http://localhost:5678}
      - N8N_ENCRYPTION_KEY=${N8N_ENCRYPTION_KEY}
    volumes:
      - n8ndata:/home/node/.n8n
    depends_on:
      - postgres

  db-backup:
    build:
      context: .
      dockerfile: ./scripts/Dockerfile.backup
    container_name: avukat-db-backup
    restart: always
    environment:
      - PGHOST=postgres
      - PGUSER=${DB_USER:-postgres}
      - PGPASSWORD=${DB_PASSWORD:-postgres_secure_password}
      - PGDATABASE=${DB_NAME:-avukat_db}
      - BACKUP_CRON=${BACKUP_CRON:-0 3 * * *}
      - GCS_BUCKET=${GCS_BUCKET}
      - GOOGLE_APPLICATION_CREDENTIALS=/secrets/gcs-key.json
    volumes:
      - ./secrets:/secrets:ro
    depends_on:
      - postgres

volumes:
  pgdata:
  n8ndata:
